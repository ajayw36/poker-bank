<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- background -->
  <rect width="512" height="512" rx="112" fill="#0d0d0d"/>

  <!-- chip body -->
  <circle cx="256" cy="256" r="176" fill="#0a4a29"/>

  <!-- gold rim -->
  <circle cx="256" cy="256" r="176" fill="none" stroke="#e8c56a" stroke-width="14"/>

  <!-- edge spots (classic poker-chip segments) -->
  <g fill="#0d0d0d">
    <rect x="233" y="48" width="46" height="64" rx="12"/>
    <rect x="233" y="48" width="46" height="64" rx="12" transform="rotate(60 256 256)"/>
    <rect x="233" y="48" width="46" height="64" rx="12" transform="rotate(120 256 256)"/>
    <rect x="233" y="48" width="46" height="64" rx="12" transform="rotate(180 256 256)"/>
    <rect x="233" y="48" width="46" height="64" rx="12" transform="rotate(240 256 256)"/>
    <rect x="233" y="48" width="46" height="64" rx="12" transform="rotate(300 256 256)"/>
  </g>

  <!-- inner disc -->
  <circle cx="256" cy="256" r="112" fill="#0d0d0d" stroke="#e8c56a" stroke-width="7"/>

  <!-- spade -->
  <path
    d="M12 2C9 6 4 9 4 13a4 4 0 0 0 7 3c-.2 1.5-1 2.5-2 3v1h6v-1c-1-.5-1.8-1.5-2-3a4 4 0 0 0 7-3c0-4-5-7-8-11z"
    fill="#e8c56a"
    transform="translate(256 256) scale(6.7) translate(-12 -12)"/>
</svg>
